<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobbies</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #0a0f1e;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #0d1426;
            border: 1px solid #1e2d4a;
            border-radius: 20px;
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        ul {
            list-style: none;
        }

        li {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #0a0f1e;
            padding: 16px 20px;
            margin: 12px 0;
            border-left: 4px solid #38bdf8;
            border-radius: 0 10px 10px 0;
            color: #94a3b8;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        li:hover {
            background: #0d1a2e;
            color: #f1f5f9;
            transform: translateX(6px);
        }

        .icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #334155;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>My Hobbies</h2>
        <p class="subtitle">Activities that inspire me, help me learn, and keep me motivated.</p>

        <ul>
            <li><span class="icon"></span> Coding and Building Websites</li>
            <li><span class="icon"></span> Playing Video Games</li>
            <li><span class="icon"></span> Watching Technology and Development Videos</li>
            <li><span class="icon"></span> Exploring New Technologies and Trends</li>
        </ul>
    </div>

    <footer>
        <p>© 2025 Muhammad Bilal Memon | All Rights Reserved</p>
    </footer>

</body>
</html>
