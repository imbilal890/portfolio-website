<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #1e40af);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }

        th {
            background: #38bdf8;
            color: #0f172a;
            padding: 18px;
            font-weight: 600;
        }

        td {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        tr:hover td {
            background: rgba(56, 189, 248, 0.15);
            transition: 0.3s;
        }

        .role {
            color: #38bdf8;
            font-weight: 500;
        }

        @media (max-width: 768px) {

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                margin-bottom: 20px;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 12px;
                overflow: hidden;
            }

            td {
                text-align: right;
                padding-left: 50%;
                position: relative;
            }

            td::before {
                position: absolute;
                left: 15px;
                font-weight: 600;
                color: #38bdf8;
            }

            td:nth-child(1)::before {
                content: "Company";
            }

            td:nth-child(2)::before {
                content: "Role";
            }

            td:nth-child(3)::before {
                content: "Duration";
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Work Experience</h1>

        <p class="subtitle">
            My professional journey and career experience.
        </p>

        <table>
            <thead>
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Duration</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>THE SALES BANK</td>
                    <td class="role">Sales Representative</td>
                    <td>2022 – 2025</td>
                </tr>

                <tr>
                    <td>Freelancer</td>
                    <td class="role">Web Developer</td>
                    <td>2025 – Present</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
