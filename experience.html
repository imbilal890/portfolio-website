<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #0a0f1e;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: #0d1426;
            border: 1px solid #1e2d4a;
            border-radius: 20px;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #38bdf8;
            color: #0a0f1e;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        td {
            padding: 16px 20px;
            text-align: center;
            background: #0d1426;
            border-bottom: 1px solid #1e2d4a;
            font-size: 0.88rem;
            color: #94a3b8;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #0d1a2e;
            transition: 0.3s;
        }

        .role {
            color: #f1f5f9;
            font-weight: 500;
        }

        td:last-child {
            white-space: nowrap;
            width: 120px;
        }

        footer {
            margin-top: 30px;
            color: #334155;
            font-size: 0.8rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { margin-bottom: 20px; border-radius: 12px; overflow: hidden; }
            td { text-align: right; padding-left: 50%; position: relative; }
            td::before { position: absolute; left: 15px; font-weight: 600; color: #38bdf8; }
            td:nth-child(1)::before { content: "Company"; }
            td:nth-child(2)::before { content: "Role"; }
            td:nth-child(3)::before { content: "Duration"; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Work Experience</h1>
        <p class="subtitle">My professional journey and career experience.</p>

        <table>
            <thead>
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Duration</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Freelancer</td>
                    <td class="role">Web Developer</td>
                    <td>2025 – Present</td>
                </tr>
            </tbody>
        </table>
    </div>

    <footer>
        <p>© 2025 Muhammad Bilal Memon | All Rights Reserved</p>
        </footer>

</body>
</html>
