<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #0a0f1e;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 750px;
            background: #0d1426;
            border: 1px solid #1e2d4a;
            border-radius: 20px;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #94a3b8;
            display: block;
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid #1e2d4a;
            border-radius: 10px;
            background: #0a0f1e;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #38bdf8;
        }

        input::placeholder, textarea::placeholder {
            color: #334155;
        }

        textarea {
            min-height: 140px;
            resize: none;
        }

        button {
            background: #38bdf8;
            color: #0a0f1e;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #7dd3fc;
        }

        .divider {
            border: none;
            border-top: 1px solid #1e2d4a;
            margin: 28px 0;
        }

        .info-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 0.88rem;
            margin-bottom: 20px;
        }

        .info-row a {
            color: #38bdf8;
            text-decoration: none;
        }

        .info-row a:hover {
            text-decoration: underline;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .socials a {
            text-decoration: none;
            color: #94a3b8;
            padding: 10px 22px;
            background: #0a0f1e;
            border: 1px solid #1e2d4a;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .socials a:hover {
            border-color: #38bdf8;
            color: #38bdf8;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #334155;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .container { padding: 25px; }
            .socials { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact Me</h1>
        <p class="subtitle">Have a project or opportunity? Feel free to reach out.</p>

        <form action="https://formsubmit.co/imbilal180@gmail.com" method="POST">
            <input type="hidden" name="_captcha" value="false">

            <div>
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>

            <div>
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div>
                <label>Message</label>
                <textarea name="message" placeholder="Write your message here..." required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>

        <hr class="divider">

        <div class="info-row">
            📧 <a href="mailto:imbilal180@gmail.com">imbilal180@gmail.com</a>
        </div>

        <div class="socials">
            <a href="https://github.com/imbilal890" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/muhammad-bilal-memon-10348638b" target="_blank">LinkedIn</a>
        </div>
    </div>

    <footer>
        <p>© 2025 Muhammad Bilal Memon | All Rights Reserved</p>
    </footer>

</body>
</html>
